<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    display: flex;
    min-height: 100vh;
    background: #f4f6f9;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: #111827;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 40px;
    font-size: 22px;
    font-weight: 600;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    padding: 12px 0;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar ul li:hover {
    color: #60a5fa;
}

/* Main Content */
.main {
    flex: 1;
    padding: 30px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.header h1 {
    font-size: 26px;
    color: #111827;
}

.card-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    margin-bottom: 10px;
    color: #374151;
}

.card p {
    font-size: 20px;
    font-weight: 600;
    color: #2563eb;
}

/* Footer */
.footer {
    margin-top: 40px;
    font-size: 14px;
    color: gray;
}
</style>
</head>

<body>

<!-- sessionid=abc123xyz -->

<div class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
        <li>Dashboard</li>
        <li>Users</li>
        <li>Reports</li>
        <li>Settings</li>
        <li>Logout</li>
    </ul>
</div>

<div class="main">
    <div class="header">
        <h1>Welcome, Admin 👋</h1>
        <span>Secure Access</span>
    </div>

    <div class="card-container">
        <div class="card">
            <h3>Total Users</h3>
            <p>1,245</p>
        </div>

        <div class="card">
            <h3>Active Sessions</h3>
            <p>89</p>
        </div>

        <div class="card">
            <h3>Reports Today</h3>
            <p>34</p>
        </div>

        <div class="card">
            <h3>System Status</h3>
            <p>Online</p>
        </div>
    </div>

    <div class="footer">
        © 2026 OSI Secure Admin Dashboard
    </div>
</div>

</body>
</html>
